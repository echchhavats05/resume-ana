<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Analyzer</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

      .card {
    background: rgba(30, 41, 59, 0.8);
    backdrop-filter: blur(10px);
    padding: 20px;
    margin: 20px auto;
    width: 60%;
    border-radius: 12px;
    box-shadow: 0 0 25px rgba(0,0,0,0.5);
}
        button {
            background: #38bdf8;
            border: none;
            padding: 12px 25px;
            color: black;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
        }

        .error {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h1>🚀 AI Resume Analyzer (ATS Powered)</h1>
<div id="loading" style="display:none; color:#38bdf8; font-weight:bold;">
    ⏳ Analyzing Resume...
</div>
<script>
document.querySelector("form").onsubmit = function() {
    document.getElementById("loading").style.display = "block";
};
</script>
<div class="card">
    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="resume" required>
        <br><br>
        <button type="submit">Analyze Resume</button>
    </form>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}
</div>

</body>
</html>
